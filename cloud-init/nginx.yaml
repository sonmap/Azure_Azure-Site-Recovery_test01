#cloud-config
package_update: true
packages:
  - nginx
  - curl
  - jq

write_files:
  - path: /usr/local/bin/asr-nginx-boot.sh
    permissions: '0755'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      REGION="unknown"
      VM_NAME="unknown"
      PRIVATE_IP="unknown"

      if curl -fsS -H Metadata:true --max-time 2 "http://169.254.169.254/metadata/instance?api-version=2021-02-01" -o /tmp/instance.json; then
        REGION=$(jq -r '.compute.location // "unknown"' /tmp/instance.json)
        VM_NAME=$(jq -r '.compute.name // "unknown"' /tmp/instance.json)
        PRIVATE_IP=$(jq -r '.network.interface[0].ipv4.ipAddress[0].privateIpAddress // "unknown"' /tmp/instance.json)
      fi

      cat >/var/www/html/index.html <<EOF
      <!doctype html>
      <html>
      <head>
        <meta charset="utf-8" />
        <title>Azure ASR DR Test</title>
        <style>
          body { font-family: Arial, sans-serif; margin: 48px; }
          .box { border: 1px solid #ddd; padding: 24px; border-radius: 8px; }
          .ok { color: #107c10; font-weight: bold; }
        </style>
      </head>
      <body>
        <div class="box">
          <h1>Azure ASR DR Test</h1>
          <p class="ok">nginx is running.</p>
          <p><b>Role:</b> ${role_label}</p>
          <p><b>Azure region:</b> $${REGION}</p>
          <p><b>VM name:</b> $${VM_NAME}</p>
          <p><b>Private IP:</b> $${PRIVATE_IP}</p>
          <p><b>Boot time:</b> $(date -Is)</p>
        </div>
      </body>
      </html>
      EOF

      echo "ok $(date -Is) $${REGION} $${VM_NAME}" >/var/www/html/health

      systemctl enable nginx
      systemctl restart nginx

  - path: /etc/systemd/system/asr-nginx-boot.service
    permissions: '0644'
    owner: root:root
    content: |
      [Unit]
      Description=Render ASR nginx test page at boot
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/asr-nginx-boot.sh
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target

runcmd:
  - systemctl daemon-reload
  - systemctl enable asr-nginx-boot.service
  - systemctl start asr-nginx-boot.service
